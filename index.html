<script>
document.addEventListener("DOMContentLoaded", function() {

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  const counter = document.querySelector(".cart-count");

  function updateCart() {
    if (counter) counter.textContent = cart.length;
    localStorage.setItem("cart", JSON.stringify(cart));
  }

  function attachCartLogic() {
    const buttons = document.querySelectorAll("button");

    buttons.forEach(btn => {
      if (btn.dataset.cartAttached) return;

      if (btn.textContent.toLowerCase().includes("корз")) {
        btn.dataset.cartAttached = "true";

        btn.addEventListener("click", function() {
          const card = btn.closest("div");
          const name = card?.querySelector("h3")?.textContent || "Товар";
          const price = card?.querySelector(".price")?.textContent || "";

          cart.push({ name, price });
          updateCart();

          btn.textContent = "Добавлено ✓";
          btn.disabled = true;
        });
      }
    });
  }

  attachCartLogic();
  updateCart();
});
</script>
Cart enabled
