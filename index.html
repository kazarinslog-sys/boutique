<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Олеся Казарина — Комнатные растения с любовью</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d0414;
            color: #ffffff;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background-color: #13061c;
            border-bottom: 1px solid #250c36;
        }
        .logo h1 {
            margin: 0;
            font-size: 24px;
            color: #ffffff;
            letter-spacing: 1px;
        }
        .logo p {
            margin: 5px 0 0 0;
            font-size: 11px;
            color: #ff007f;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .cart-status {
            font-size: 14px;
            color: #cccccc;
        }
        .cart-status span {
            color: #ff007f;
            font-weight: bold;
        }
        .order-btn {
            background: transparent;
            color: #ff007f;
            border: 2px solid #ff007f;
            padding: 10px 20px;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .order-btn:hover {
            background: #ff007f;
            color: #ffffff;
            box-shadow: 0 0 15px #ff007f;
        }
        .hero {
            text-align: center;
            padding: 60px 20px;
            position: relative;
        }
        .hero h2 {
            font-size: 36px;
            margin: 0 0 15px 0;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .hero::after {
            content: '';
            display: block;
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff007f, transparent);
            margin: 20px auto 25px auto;
            box-shadow: 0 0 10px #ff007f;
        }
        .hero p {
            color: #aaaaaa;
            font-size: 16px;
            margin: 0;
        }
        .catalog {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 20px 40px 60px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background-color: #13061c;
            border-radius: 6px;
            overflow: hidden;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 4px;
            background-color: #0d0414;
            border: 1px solid #250c36;
        }
        .card h3 {
            margin: 15px 0 8px 0;
            font-size: 18px;
            font-weight: 600;
        }
        .card .description {
            font-size: 12px;
            color: #888888;
            margin: 0 0 15px 0;
            line-height: 1.4;
            min-height: 34px;
        }
        .card .price {
            font-size: 18px;
            color: #ff007f;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .buy-btn {
            background: transparent;
            color: #ffffff;
            border: 1px solid #250c36;
            padding: 12px;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            border-radius: 4px;
            transition: background 0.3s, border-color 0.3s;
        }
        .buy-btn:hover {
            background: #250c36;
            border-color: #ff007f;
        }

        /* Форма заказа (модалка) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(13, 4, 20, 0.85);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background-color: #13061c;
            margin: 10% auto; padding: 30px;
            border: 2px solid #ff007f;
            box-shadow: 0 0 25px #ff007f;
            width: 90%; max-width: 400px;
            border-radius: 8px; color: #ffffff;
            position: relative;
        }
        .close-btn {
            position: absolute; right: 20px; top: 15px;
            color: #ff007f; font-size: 32px; cursor: pointer;
        }
        .modal h2 { margin: 0 0 10px 0; font-size: 22px; }
        .modal p { color: #888888; font-size: 13px; margin: 0 0 20px 0; }
        .modal input, .modal textarea {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: #0d0414; border: 1px solid #250c36;
            border-radius: 4px; color: #ffffff; box-sizing: border-box;
        }
        .modal input:focus, .modal textarea:focus {
            outline: none; border-color: #ff007f; box-shadow: 0 0 5px #ff007f;
        }

        /* --- НОВЫЙ БЛОК: СТИЛИ ДЛЯ ИИ-ЧАТА --- */
        .ai-chat-trigger {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background-color: #ff007f;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 0 15px #ff007f;
            z-index: 999;
            transition: transform 0.3s ease, background-color 0.3s;
        }
        .ai-chat-trigger:hover {
            transform: scale(1.1);
            background-color: #e60073;
        }
        .ai-chat-window {
            display: none;
            position: fixed;
            bottom: 105px;
            right: 30px;
            width: 350px;
            height: 450px;
            background-color: #13061c;
            border: 2px solid #ff007f;
            box-shadow: 0 0 25px rgba(250, 0, 127, 0.4);
            border-radius: 12px;
            z-index: 999;
            flex-direction: column;
            overflow: hidden;
            font-size: 14px;
        }
        .ai-chat-header {
            background-color: #1a0926;
            padding: 15px;
            border-bottom: 1px solid #250c36;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .ai-chat-header h4 { margin: 0; font-size: 15px; color: #fff; display: flex; align-items: center; gap: 8px; }
        .ai-chat-header h4::before { content: '●'; color: #00ffcc; text-shadow: 0 0 5px #00ffcc; }
        .ai-chat-close { color: #ff007f; font-size: 20px; cursor: pointer; font-weight: bold; }
        .ai-chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: #0d0414;
        }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 8px; line-height: 1.4; word-wrap: break-word; }
        .msg.bot { background-color: #250c36; color: #ffffff; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #3d1459; }
        .msg.user { background-color: #ff007f; color: #ffffff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-chat-input-area {
            padding: 12px;
            background-color: #13061c;
            border-top: 1px solid #250c36;
            display: flex;
            gap: 10px;
        }
        .ai-chat-input-area input {
            flex: 1; background: #0d0414; border: 1px solid #250c36;
            padding: 10px; border-radius: 4px; color: #fff;
        }
        .ai-chat-input-area input:focus { outline: none; border-color: #ff007f; }
        .ai-send-btn {
            background: #ff007f; border: none; color: #white; padding: 0 15px;
            border-radius: 4px; color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .ai-send-btn:hover { background: #e60073; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <h1>Олеся Казарина</h1>
            <p>комнатные растения с любовью</p>
        </div>
        <div class="header-right">
            <div class="cart-status">Корзина: <span id="cart-count">0</span></div>
            <button class="order-btn" onclick="openModal()">ЗАКАЗАТЬ</button>
        </div>
    </header>

    <section class="hero">
        <h2>Эстетика природы в вашем доме</h2>
        <p>Бережно выращенные комнатные растения премиального качества.</p>
    </section>

    <section class="catalog">
        <!-- Товар 1: Адениум -->
        <div class="card">
            <img src="adenium.jpg.png" alt="Адениум">
            <h3>Адениум</h3>
            <p class="description">Изящный суккулент со скульптурным стволом-бонсай.</p>
            <div class="price">3 400 ₽</div>
            <button class="buy-btn" onclick="addToCart()">В КОРЗИНУ</button>
        </div>

        <!-- Товар 2: Кратон -->
        <div class="card">
            <img src="croton.jpg" alt="Кратон">
            <h3>Кратон</h3>
            <p class="description">Яркое лиственное растение с огненной палитрой листьев.</p>
            <div class="price">2 900 ₽</div>
